name: Eaquel_Redirector CI/CD

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set Up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Compiler Cache (CCache)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ndk-${{ hashFiles('**/CMakeLists.txt', '**/*.cpp') }}
          restore-keys: ${{ runner.os }}-ndk-

      - name: Grant Gradle Execute Permission
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Debug & Release (AAR)
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          ./gradlew :Redirector:assembleDebug :Redirector:assembleRelease --no-daemon -PdisableLogs=true

      - name: Upload Compiled Artifacts (AAR)
        uses: actions/upload-artifact@v4
        with:
          name: eaquel-redirector-${{ matrix.os }}-aar
          path: Redirector/build/outputs/aar/*.aar
          if-no-files-found: error

      - name: Upload Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: eaquel-redirector-${{ matrix.os }}-symbols
          path: Redirector/build/symbols/**
          if-no-files-found: ignore